name: CI

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]
  workflow_dispatch:

jobs:
  ci:
    name: Lint, Format, Test, and Verify GPG
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sandbox/Part_A_code-yagni_cicd

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Fetch all history so git rev-list/verify-commit works for any commit range
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Dependencies
        run: |
          uv sync --all-groups

      - name: Run Ruff Linter
        run: |
          uv run ruff check src/ tests/

      - name: Run Ruff Formatter (Check)
        run: |
          uv run ruff format --check src/ tests/

      - name: Run Unit Tests
        run: |
          uv run pytest

      - name: Verify GPG Commit Signatures
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Verify all commits introduced by the PR
            uv run python src/gpg_verify.py --rev-range "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" --verbose
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            # Verify all commits pushed in this event
            uv run python src/gpg_verify.py --rev-range "${{ github.event.before }}..${{ github.event.after }}" --verbose
          else
            # Fallback to checking just HEAD
            uv run python src/gpg_verify.py --verbose
          fi
